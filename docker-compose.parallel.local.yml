name: gca-intranet

# ==========================================
# 1. BASE TEMPLATES (DRY Configuration)
# ==========================================

x-db-base: &db-base
  image: mysql:8.0
  environment:
    MYSQL_DATABASE: ${DB_NAME}
    MYSQL_USER: ${DB_USER}
    MYSQL_PASSWORD: ${DB_PASSWORD}
    MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
    interval: 5s
    timeout: 5s
    retries: 30

x-wp-base: &wp-base
  build: .
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/wp-login.php >/dev/null || exit 1"]
    interval: 5s
    timeout: 5s
    retries: 30

x-init-base: &init-base
  build: .
  working_dir: /var/www/html
  command: ["/bin/sh", "-lc", "/usr/local/bin/wp-init.sh"]
  restart: "no"

# Shared Environment Variables
x-wp-env: &wp-env
  WORDPRESS_DB_NAME: ${DB_NAME}
  WORDPRESS_DB_USER: ${DB_USER}
  WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}

x-init-env: &init-env
  <<: *wp-env
  WP_TITLE: ${WP_TITLE}
  WP_ADMIN_USER: ${WP_ADMIN_USER}
  WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
  WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
  WP_THEME: ${WP_THEME}

# ==========================================
# 2. ACTUAL SERVICES
# ==========================================

services:
  # --- DB Services ---
  db0:
    <<: *db-base
    volumes:
      - db0_data:/var/lib/mysql

  db1:
    <<: *db-base
    volumes:
      - db1_data:/var/lib/mysql

  db2:
    <<: *db-base
    volumes:
      - db2_data:/var/lib/mysql

  db3:
    <<: *db-base
    volumes:
      - db3_data:/var/lib/mysql

  # --- WordPress Services ---
  wordpress0:
    <<: *wp-base
    depends_on:
      db0:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      <<: *wp-env
      WORDPRESS_DB_HOST: db0:3306
      WP_HOME: http://localhost:8080
      WP_SITEURL: http://localhost:8080
    volumes:
      - wp0_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wordpress1:
    <<: *wp-base
    depends_on:
      db1:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      <<: *wp-env
      WORDPRESS_DB_HOST: db1:3306
      WP_HOME: http://localhost:8081
      WP_SITEURL: http://localhost:8081
    volumes:
      - wp1_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wordpress2:
    <<: *wp-base
    depends_on:
      db2:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      <<: *wp-env
      WORDPRESS_DB_HOST: db2:3306
      WP_HOME: http://localhost:8082
      WP_SITEURL: http://localhost:8082
    volumes:
      - wp2_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wordpress3:
    <<: *wp-base
    depends_on:
      db3:
        condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      <<: *wp-env
      WORDPRESS_DB_HOST: db3:3306
      WP_HOME: http://localhost:8083
      WP_SITEURL: http://localhost:8083
    volumes:
      - wp3_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  # --- Init Services ---
  init0:
    <<: *init-base
    depends_on:
      db0:
        condition: service_healthy
    environment:
      <<: *init-env
      WORDPRESS_DB_HOST: db0:3306
      WP_URL: http://localhost:8080
      WP_HOME: http://localhost:8080
      WP_SITEURL: http://localhost:8080
    volumes:
      - wp0_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  init1:
    <<: *init-base
    depends_on:
      db1:
        condition: service_healthy
    environment:
      <<: *init-env
      WORDPRESS_DB_HOST: db1:3306
      WP_URL: http://localhost:8081
      WP_HOME: http://localhost:8081
      WP_SITEURL: http://localhost:8081
    volumes:
      - wp1_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  init2:
    <<: *init-base
    depends_on:
      db2:
        condition: service_healthy
    environment:
      <<: *init-env
      WORDPRESS_DB_HOST: db2:3306
      WP_URL: http://localhost:8082
      WP_HOME: http://localhost:8082
      WP_SITEURL: http://localhost:8082
    volumes:
      - wp2_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  init3:
    <<: *init-base
    depends_on:
      db3:
        condition: service_healthy
    environment:
      <<: *init-env
      WORDPRESS_DB_HOST: db3:3306
      WP_URL: http://localhost:8083
      WP_HOME: http://localhost:8083
      WP_SITEURL: http://localhost:8083
    volumes:
      - wp3_content:/var/www/html/wp-content
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

# ==========================================
# 3. VOLUMES
# ==========================================

volumes:
  db0_data:
  db1_data:
  db2_data:
  db3_data:
  wp0_content:
  wp1_content:
  wp2_content:
  wp3_content: